services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
      - API_URL=http://api:3001
      - DATABASE_URL=postgresql://writer:writer_dev_password@postgres:5432/seshat
      - NEXT_PUBLIC_API_URL=/api
      - REDIS_URL=redis://redis:6379
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://writer:writer_dev_password@postgres:5432/seshat
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://writer:writer_dev_password@postgres:5432/seshat
      - REDIS_URL=redis://redis:6379
    command: ["pnpm", "--filter", "@seshat/worker", "worker"]
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: writer
      POSTGRES_PASSWORD: writer_dev_password
      POSTGRES_DB: seshat
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
